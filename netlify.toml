# Netlify config para Next.js (SSR)
# Si publish no se setea, Netlify usa por defecto la raíz del repo y el plugin aborta.
# .next existe después de next build; el plugin lo usa y genera su output.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
