# Netlify config para Next.js (SSR)
# El plugin @netlify/plugin-nextjs gestiona el output. NO pongas "Publish directory" en la UI
# (o déjalo vacío), sino el plugin falla porque no acepta publish = raíz del repo.

[build]
  command = "npm run build"
  publish = ".netlify/output"

[[plugins]]
  package = "@netlify/plugin-nextjs"
